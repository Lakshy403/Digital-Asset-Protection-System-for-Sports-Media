query AllDigitalAccounts @auth(level: USER, insecureReason: "This operation is safe to expose to all logged in users.") {
  digitalAccounts {
    id
    name
    accountType
    url
    username
    passwordHint
    recoveryEmail
    notes
    createdAt
  }
}

query AllBeneficiaries @auth(level: USER, insecureReason: "This operation is safe to expose to all logged in users.") {
  beneficiaries {
    id
    firstName
    lastName
    email
    phone
    relationship
    createdAt
  }
}

query AllTrustedAgents @auth(level: USER, insecureReason: "This operation is safe to expose to all logged in users.") {
  trustedAgents {
    id
    firstName
    lastName
    email
    phone
    accessLevel
    designationDate
    createdAt
  }
}

query AllAccountInstructions @auth(level: USER, insecureReason: "This operation is safe to expose to all logged in users.") {
  accountInstructions {
    id
    instructionType
    eventTrigger
    specificInstructions
    accessGrantDuration
    createdAt
    digitalAccount {
      name
      accountType
    }
    beneficiary {
      firstName
      lastName
    }
  }
}